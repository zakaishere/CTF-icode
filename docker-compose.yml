# =============================================================================
#  icode-ctf — Docker Compose
#
#  ZERO-CONFIG: just run `docker compose up -d`. Every value has a safe default,
#  so no .env file is required for local / first-time use.
#
#  PRODUCTION: copy .env.example → .env and set CTF_INSTANCE_HOST (your public
#  IP/domain) plus strong JWT_SECRET / CTF_FLAG_SECRET / DB_PASSWORD. Any value
#  you put in .env automatically overrides the defaults below.
#
#  Architecture:
#    nginx (:80) → reverse proxy → frontend (:3000) + backend (:8080)
#    backend  → db (:5432) for persistence
#    backend  → /var/run/docker.sock to spawn challenge containers as HOST siblings
#
#  ⚠ UPLOAD PATH (do not change to a named volume):
#    The backend spawns challenge containers via the HOST Docker daemon, so the
#    upload directory MUST be the SAME absolute path on the host and inside the
#    backend container — hence the bind mount below. Docker auto-creates the
#    host directory on first run.
#
#  Default admin (created by docker/db/init.sql):
#    admin@icode-ctf.local / Admin123!  — change the password after first login.
# =============================================================================

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: icode-db
    restart: unless-stopped
    # Memory cap — keeps Postgres from starving the JVM on a 4 GB host.
    mem_limit: 512m
    environment:
      POSTGRES_DB:       ${DB_NAME:-icode_ctf}
      POSTGRES_USER:     ${DB_USERNAME:-icode_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icode_local_dev_pass}
    volumes:
      - db-data:/var/lib/postgresql/data
      # Init script runs once on first container creation: creates the schema,
      # all tables, and the default admin account.
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - icode-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-icode_user} -d ${DB_NAME:-icode_ctf}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  backend:
    build:
      context:    ./Backend
      dockerfile: Dockerfile
    image: icode-ctf-backend:latest
    container_name: icode-backend
    restart: unless-stopped
    # Memory cap. The JVM (-XX:+UseContainerSupport -XX:MaxRAMPercentage=75 in the
    # Dockerfile) reads THIS cgroup limit, so heap tops out at ~960 MB instead of
    # grabbing 75% of the whole 4 GB host and forcing everything else to swap.
    mem_limit: 1280m
    # Optional: any extra vars in .env (e.g. JWT_EXPIRY_MS, DB_POOL_SIZE,
    # DOCKER_TLS_VERIFY) are injected too. Absent .env is fine — required: false.
    env_file:
      - path: .env
        required: false
    environment:
      # Database — service name "db", schema "icode_ctf". Defaults match the db service.
      DB_URL:      jdbc:postgresql://db:5432/${DB_NAME:-icode_ctf}?currentSchema=icode_ctf
      DB_USERNAME: ${DB_USERNAME:-icode_user}
      DB_PASSWORD: ${DB_PASSWORD:-icode_local_dev_pass}

      # Secrets — these dev defaults let the platform boot with zero config.
      # ⚠ Override with strong values in .env before any public deployment.
      JWT_SECRET:      ${JWT_SECRET:-dev_only_jwt_secret_override_in_production_0001}
      CTF_FLAG_SECRET: ${CTF_FLAG_SECRET:-dev_only_flag_secret_override_in_production_01}

      # Public IP/host players use to reach challenge instances (nc <host> <port>).
      # Defaults to localhost; set CTF_INSTANCE_HOST in .env for production.
      CTF_INSTANCE_HOST: ${CTF_INSTANCE_HOST:-localhost}
      CTF_PORT_MIN:      ${CTF_PORT_MIN:-32000}
      CTF_PORT_MAX:      ${CTF_PORT_MAX:-33000}

      # Backend spawns challenge containers via the HOST docker daemon.
      DOCKER_HOST:     unix:///var/run/docker.sock
      CTF_UPLOAD_PATH: ${CTF_UPLOAD_PATH:-/data/ctf-uploads}

      # Worker Agent — leave blank to use local Docker (default).
      WORKER_AGENT_URL:        ${WORKER_AGENT_URL:-}
      WORKER_AGENT_KEY_ID:     ${WORKER_AGENT_KEY_ID:-}
      WORKER_AGENT_SECRET:     ${WORKER_AGENT_SECRET:-}
      # Platform's own URL as seen from the agent server (used to serve ZIPs).
      # Set to http://<PLATFORM_SERVER_IP>:8080 when agent is on a different host.
      PLATFORM_INTERNAL_URL:   ${PLATFORM_INTERNAL_URL:-http://localhost:8080}

      # Email verification off by default so registration works without SMTP.
      # Set APP_SECURITY_DISABLE_VERIFICATION=false + MAIL_* in .env for production.
      APP_SECURITY_DISABLE_VERIFICATION: ${APP_SECURITY_DISABLE_VERIFICATION:-true}
      MAIL_HOST:     ${MAIL_HOST:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"

      # CORS — allow localhost by default; set CORS_ALLOWED_ORIGINS in .env for prod.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}

      # Health-check probes for spawned instances must reach the HOST's published
      # ports. host.docker.internal resolves to the host gateway via extra_hosts.
      CTF_HEALTH_CHECK_HOST: host.docker.internal
    extra_hosts:
      # Lets the backend container reach the HOST (for challenge port probes).
      - "host.docker.internal:host-gateway"
    volumes:
      # Docker socket — lets the backend spawn sibling containers on the host.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind mount: SAME absolute path on host AND in container (required so the
      # HOST docker daemon can resolve build contexts). Docker creates it on first run.
      - ${CTF_UPLOAD_PATH:-/data/ctf-uploads}:${CTF_UPLOAD_PATH:-/data/ctf-uploads}
    networks:
      - icode-net
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 60s

  # ── Frontend (Next.js standalone) ──────────────────────────────────────────
  frontend:
    build:
      context:    ./Frontend
      dockerfile: Dockerfile
    image: icode-ctf-frontend:latest
    container_name: icode-frontend
    restart: unless-stopped
    # Memory cap — the Next.js standalone server is light at runtime.
    mem_limit: 512m
    environment:
      NODE_ENV: production
      # Empty → the browser uses same-origin relative URLs, which nginx proxies
      # to the backend. No need to know the public IP at build time.
      NEXT_PUBLIC_API_BASE_URL: ""
    networks:
      - icode-net
    depends_on:
      - backend
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s

  # ── Nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    image: icode-ctf-nginx:latest
    container_name: icode-nginx
    restart: unless-stopped
    mem_limit: 96m
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/icode-ctf.hared.tech/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/icode-ctf.hared.tech/privkey.pem:/etc/ssl/private/privkey.pem:ro
    networks:
      - icode-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  db-data:
    name: icode-db-data

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  icode-net:
    name: icode-net
    driver: bridge
