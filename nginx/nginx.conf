worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip for text responses
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # Detect real scheme from Cloudflare — CF-Visitor header carries the
    # original protocol ("https") even though Cloudflare connects to us on HTTP.
    map $http_cf_visitor $real_scheme {
        default          $scheme;
        "~\"scheme\":\"https\"" https;
    }

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name icode-ctf.hared.tech;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name icode-ctf.hared.tech;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Challenge ZIP uploads can be up to 100 MB; add 50 MB overhead
        client_max_body_size 150m;

        # Long timeout for Docker image builds (up to 600s configured)
        proxy_read_timeout    620s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    620s;

        # Common proxy headers — set once, inherited by all locations
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # ── Health check (nginx itself) ──────────────────────────────────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── WebSocket — STOMP over SockJS (/ws-endpoint and /ws) ────────────
        # Must be matched before /api to avoid the /ws path being caught by /api/
        location ~ ^/(ws-endpoint|ws)(/|$) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Disable buffering for long-lived WS connections
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }

        # ── Backend API (/api/ prefix preserved) ─────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_buffering on;
        }

        # ── Frontend — everything else ────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            # Next.js dev mode uses SSE for hot-reload; disable buffering for it
            proxy_buffering off;
        }
    }
}
